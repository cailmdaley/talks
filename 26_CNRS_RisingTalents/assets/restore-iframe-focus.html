<script>
/*
  The live METR embed is a cross-origin iframe. When the pointer clicks (or the chart
  grabs focus), keyboard navigation for reveal stops — arrow keys go to the iframe, not
  the deck. We can't reach inside a cross-origin frame, but we CAN keep yanking focus
  back to the deck window. Two mechanisms:
    1. Event-driven reclaim (mousemove / mousedown outside the frame / window focus).
    2. A low-frequency poll — the key fix: while the pointer sits ON the iframe the parent
       gets no mousemove, so the old event-only version stayed stuck until you moved the
       mouse AWAY. The poll reclaims focus ~5x/second regardless, so arrows work again on
       their own. A single click still registers in the chart (toggling linear/log etc.)
       before focus returns, so the chart stays usable.
*/
(function () {
  function reclaim() {
    var a = document.activeElement;
    if (a && a.tagName === 'IFRAME') {
      try { a.blur(); } catch (e) {}
      try { window.focus(); } catch (e) {}
    }
  }
  document.addEventListener('mousemove', reclaim, true);
  document.addEventListener('mousedown', function (e) {
    if (!e.target || e.target.tagName !== 'IFRAME') reclaim();
  }, true);
  window.addEventListener('focus', reclaim);
  // The poll: auto-restores navigation without needing the pointer to leave the chart.
  setInterval(reclaim, 200);
})();
</script>
