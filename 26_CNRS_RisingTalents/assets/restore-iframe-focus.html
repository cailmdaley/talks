<script>
/*
  Reveal loses keyboard navigation (arrow keys) when a cross-origin iframe — the live
  METR embed — steals focus on click. We can't reach inside the cross-origin frame, but
  we CAN reclaim focus for the deck the moment the pointer returns to the slide: while the
  pointer is over the iframe the parent gets no mousemove, so the first mousemove back on
  the slide (or any click outside the iframe) tells us to blur the frame and refocus the
  window. Arrow keys work again without a page refresh.
*/
(function () {
  function reclaim() {
    var a = document.activeElement;
    if (a && a.tagName === 'IFRAME') {
      try { a.blur(); } catch (e) {}
      try { window.focus(); } catch (e) {}
    }
  }
  document.addEventListener('mousemove', reclaim, true);
  document.addEventListener('mousedown', function (e) {
    if (!e.target || e.target.tagName !== 'IFRAME') reclaim();
  }, true);
  // Also reclaim whenever the window regains focus.
  window.addEventListener('focus', reclaim);
})();
</script>
