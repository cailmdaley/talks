    <path d="M -13.5 5.8 L -12.2 5.2 L -10.9 4.7 L -9.7 4.2 L -8.6 3.8 L -7.5 3.4 L -6.4 3.1 L -5.4 2.9 L -4.4 2.7 L -3.5 2.6 L -2.6 2.5 L -1.7 2.4 L -0.9 2.4 L -0.0 2.3 L 0.9 2.4 L 1.7 2.4 L 2.6 2.5 L 3.5 2.6 L 4.4 2.7 L 5.4 2.9 L 6.4 3.1 L 7.5 3.4 L 8.6 3.8 L 9.7 4.2 L 10.9 4.7 L 12.2 5.2 L 13.5 5.8 L 16.4 2.2 L 15.4 1.0 L 14.4 -0.2 L 13.3 -1.3 L 12.1 -2.3 L 10.9 -3.2 L 9.7 -4.0 L 8.4 -4.7 L 7.1 -5.4 L 5.7 -5.9 L 4.3 -6.3 L 2.9 -6.6 L 1.4 -6.8 L -0.0 -6.9 L -1.4 -6.8 L -2.9 -6.6 L -4.3 -6.3 L -5.7 -5.9 L -7.1 -5.4 L -8.4 -4.7 L -9.7 -4.0 L -10.9 -3.2 L -12.1 -2.3 L -13.3 -1.3 L -14.4 -0.2 L -15.4 1.0 L -16.4 2.2 Z" fill="#bc4538" fill-opacity="0.12" stroke="#bc4538" stroke-width="2.4" opacity="0.9" />
    </g>
    <circle r="3" fill="#bc4538" />
