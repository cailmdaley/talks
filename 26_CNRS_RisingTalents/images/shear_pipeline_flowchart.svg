<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Weak-lensing shape measurement pipeline</title>
  <desc id="desc">A six-step schematic pipeline from sky images through PSF modelling, galaxy shapes, calibration, and shear correlations.</desc>
  <defs>
    <style>
      .label { font-family: "EB Garamond", Georgia, serif; font-size: 30px; font-weight: 600; fill: #1b1611; }
      .small { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 17px; fill: #7a6f5c; letter-spacing: 0.02em; }
      .ink { stroke: #1b1611; }
      .muted { stroke: #7a6f5c; }
      .accent { stroke: #bc4538; }
      .teal { stroke: #3f8278; }
      .cobalt { stroke: #3d5ba0; }
      .ochre { stroke: #c49333; }
    </style>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc4538" />
    </marker>
    <radialGradient id="nodeGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.84" />
      <stop offset="62%" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#f7f0e1" stop-opacity="0" />
    </radialGradient>
    <pattern id="fiber" width="74" height="58" patternUnits="userSpaceOnUse">
      <path d="M-12 31 C 18 4, 52 5, 86 34" fill="none" stroke="#3f8278" stroke-opacity="0.13" stroke-width="2" />
      <path d="M-8 49 C 22 24, 48 21, 82 48" fill="none" stroke="#3d5ba0" stroke-opacity="0.10" stroke-width="1.7" />
      <circle cx="21" cy="19" r="2.4" fill="#3f8278" fill-opacity="0.16" />
      <circle cx="56" cy="38" r="2.1" fill="#bc4538" fill-opacity="0.12" />
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#f7f0e1" />
  <rect x="40" y="54" width="1120" height="636" rx="28" fill="url(#fiber)" opacity="0.62" />
  <rect x="40" y="54" width="1120" height="636" rx="28" fill="#f7f0e1" opacity="0.72" />

  <path d="M 151 356 C 261 276, 356 449, 470 360 S 682 289, 786 362 S 994 434, 1084 352"
        fill="none" stroke="#bc4538" stroke-width="8" stroke-linecap="round" stroke-opacity="0.82" marker-end="url(#arrow)" />
  <path d="M 151 356 C 261 276, 356 449, 470 360 S 682 289, 786 362 S 994 434, 1084 352"
        fill="none" stroke="#f7f0e1" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.68" />

  <g transform="translate(118 342)">
    <circle r="102" fill="url(#nodeGlow)" />
    <circle r="74" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2" />
    <path d="M-42 8 C-15 -35, 34 -28, 45 1 C 20 -12, -13 -11, -42 8Z" fill="none" class="teal" stroke-width="3" opacity="0.75" />
    <ellipse cx="-36" cy="-24" rx="10" ry="5.5" fill="none" class="cobalt" stroke-width="2.4" transform="rotate(-25 -36 -24)" />
    <ellipse cx="2" cy="-7" rx="14" ry="7" fill="none" class="muted" stroke-width="2.5" transform="rotate(18 2 -7)" />
    <ellipse cx="36" cy="26" rx="11" ry="5.5" fill="none" class="ochre" stroke-width="2.5" transform="rotate(-8 36 26)" />
    <circle cx="-12" cy="31" r="2.8" fill="#bc4538" opacity="0.45" />
    <text class="label" x="0" y="142" text-anchor="middle">sky</text>
  </g>

  <g transform="translate(316 346)">
    <circle r="96" fill="url(#nodeGlow)" />
    <rect x="-58" y="-47" width="116" height="94" rx="10" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2.3" />
    <rect x="-43" y="-31" width="86" height="62" rx="5" fill="#ede2ce" stroke="#7a6f5c" stroke-opacity="0.45" stroke-width="1.5" />
    <circle cx="-21" cy="-9" r="6" fill="#3f8278" opacity="0.55" />
    <circle cx="18" cy="13" r="5" fill="#3d5ba0" opacity="0.45" />
    <path d="M-72 -73 L72 -73 M-46 -73 L-46 -48 M46 -73 L46 -48" fill="none" class="muted" stroke-width="4" stroke-linecap="round" opacity="0.55" />
    <text class="label" x="0" y="138" text-anchor="middle">images</text>
  </g>

  <g transform="translate(504 345)">
    <circle r="98" fill="url(#nodeGlow)" />
    <circle r="55" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2.2" />
    <ellipse rx="43" ry="17" fill="none" class="cobalt" stroke-width="3" opacity="0.7" transform="rotate(24)" />
    <ellipse rx="28" ry="10" fill="none" class="cobalt" stroke-width="2" opacity="0.45" transform="rotate(24)" />
    <path d="M-70 61 C-36 42, -3 42, 34 60" fill="none" class="accent" stroke-width="2.6" stroke-linecap="round" opacity="0.58" />
    <path d="M-72 -61 C-36 -43, 3 -42, 36 -60" fill="none" class="accent" stroke-width="2.6" stroke-linecap="round" opacity="0.36" />
    <text class="label" x="0" y="140" text-anchor="middle">PSF</text>
  </g>

  <g transform="translate(698 347)">
    <circle r="98" fill="url(#nodeGlow)" />
    <circle r="60" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2.2" />
    <ellipse cx="-24" cy="-18" rx="22" ry="8" fill="none" class="ink" stroke-width="2.5" opacity="0.65" transform="rotate(20 -24 -18)" />
    <ellipse cx="24" cy="-6" rx="20" ry="7" fill="none" class="ink" stroke-width="2.5" opacity="0.65" transform="rotate(20 24 -6)" />
    <ellipse cx="-4" cy="28" rx="24" ry="8" fill="none" class="ink" stroke-width="2.5" opacity="0.65" transform="rotate(20 -4 28)" />
    <path d="M-50 -49 L50 49 M-47 52 L-30 51 M30 -51 L47 -52" fill="none" class="teal" stroke-width="2" opacity="0.42" />
    <text class="label" x="0" y="138" text-anchor="middle">shapes</text>
  </g>

  <g transform="translate(890 347)">
    <circle r="98" fill="url(#nodeGlow)" />
    <rect x="-61" y="-51" width="122" height="102" rx="12" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2.2" />
    <path d="M-37 22 C-19 -8, 6 -11, 37 -33" fill="none" class="teal" stroke-width="4" stroke-linecap="round" />
    <path d="M-38 -28 L39 -28 M-38 0 L39 0 M-38 28 L39 28" fill="none" class="muted" stroke-width="1.5" opacity="0.42" />
    <circle cx="-37" cy="22" r="5" fill="#bc4538" opacity="0.78" />
    <circle cx="4" cy="-11" r="5" fill="#bc4538" opacity="0.78" />
    <circle cx="37" cy="-33" r="5" fill="#bc4538" opacity="0.78" />
    <text class="label" x="0" y="138" text-anchor="middle">calib.</text>
  </g>

  <g transform="translate(1082 346)">
    <circle r="102" fill="url(#nodeGlow)" />
    <circle r="68" fill="#fbf6e9" stroke="#c5b89e" stroke-width="2.2" />
    <circle cx="-35" cy="-24" r="7" fill="#3f8278" opacity="0.56" />
    <circle cx="28" cy="-33" r="6" fill="#3d5ba0" opacity="0.48" />
    <circle cx="-12" cy="28" r="7" fill="#c49333" opacity="0.48" />
    <circle cx="36" cy="24" r="5.5" fill="#bc4538" opacity="0.46" />
    <path d="M-35 -24 L28 -33 M-35 -24 L-12 28 M-12 28 L36 24 M28 -33 L36 24" fill="none" class="muted" stroke-width="2.2" opacity="0.42" />
    <path d="M-51 48 C-30 20, -6 13, 8 1 S 34 -16, 50 -43" fill="none" class="accent" stroke-width="3.5" stroke-linecap="round" opacity="0.62" />
    <text class="label" x="0" y="142" text-anchor="middle">2pt corr.</text>
  </g>

  <g opacity="0.72">
    <text class="small" x="145" y="622" text-anchor="middle">faint shear</text>
    <text class="small" x="505" y="622" text-anchor="middle">model the blur</text>
    <text class="small" x="890" y="622" text-anchor="middle">bias corrections</text>
    <path d="M112 584 l36 -18 l36 18" fill="none" class="teal" stroke-width="2" stroke-linecap="round" />
    <path d="M468 584 h72 M468 599 h72" fill="none" class="cobalt" stroke-width="2" stroke-linecap="round" />
    <path d="M842 590 h98" fill="none" class="accent" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 7" />
  </g>
</svg>
