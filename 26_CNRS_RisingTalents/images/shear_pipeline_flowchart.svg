<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 300" role="img" aria-labelledby="title desc">
  <title id="title">From galaxy shapes to cosmology</title>
  <desc id="desc">A seven-step schematic pipeline from sky images through PSF modelling, galaxy shapes, calibration, and pair correlations to cosmological constraints.</desc>
  <defs>
    <style>
      .label { font-family: "EB Garamond", Georgia, serif; font-size: 30px; font-weight: 600; fill: #1b1611; }
      .ink { stroke: #1b1611; }
      .muted { stroke: #7a6f5c; }
      .accent { stroke: #bc4538; }
      .teal { stroke: #3f8278; }
      .cobalt { stroke: #3d5ba0; }
      .ochre { stroke: #c49333; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc4538" />
    </marker>
    <radialGradient id="nodeGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.84" />
      <stop offset="62%" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#f7f0e1" stop-opacity="0" />
    </radialGradient>
    <pattern id="fiber" width="74" height="58" patternUnits="userSpaceOnUse">
      <path d="M-12 31 C 18 4, 52 5, 86 34" fill="none" stroke="#3f8278" stroke-opacity="0.13" stroke-width="2" />
      <path d="M-8 49 C 22 24, 48 21, 82 48" fill="none" stroke="#3d5ba0" stroke-opacity="0.10" stroke-width="1.7" />
      <circle cx="21" cy="19" r="2.4" fill="#3f8278" fill-opacity="0.16" />
      <circle cx="56" cy="38" r="2.1" fill="#bc4538" fill-opacity="0.12" />
    </pattern>
  </defs>

  <rect width="1480" height="300" fill="#f7f0e1" />
  <rect x="34" y="26" width="1412" height="248" rx="24" fill="url(#fiber)" opacity="0.62" />
  <rect x="34" y="26" width="1412" height="248" rx="24" fill="#f7f0e1" opacity="0.72" />

  <path d="M 215 132 C 300 96, 405 168, 500 132 S 690 96, 790 132 S 980 168, 1080 132 S 1235 124, 1300 132"
